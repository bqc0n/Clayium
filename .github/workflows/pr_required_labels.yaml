# Manages labels on PRs before allowing merging
name: Pull Request Labels

on:
  pull_request_target:
    types: ["opened", "reopened", "synchronize", "labeled", "unlabeled"]

# if a second commit is pushed quickly after the first, cancel the first one's build
concurrency:
  group: pr-labels-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  Labels:
    runs-on: ubuntu-slim

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Auto Labeling
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
        with:
          configuration-path: .github/labeler.yaml
      - name: Check for Merge-Blocking Labels # blocks merge if present
        uses: mheap/github-action-required-labels@8afbe8ae6ab7647d0c9f0cfa7c2f939650d22509 # 5.5.1
        with:
          mode: exactly
          count: 0
          labels: 'status: do not merge'
          exit_type: failure

      - name: Check for Required Labels # require at least one of these labels
        uses: mheap/github-action-required-labels@8afbe8ae6ab7647d0c9f0cfa7c2f939650d22509 # 5.5.1
        with:
          mode: minimum
          count: 1
          labels: 'feature, bug, refactoring, translation, type: ci, ignore changelog, documentation, chore, other, renovate'
          exit_type: failure