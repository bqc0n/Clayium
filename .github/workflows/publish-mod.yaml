name: Publish Mod

on:
  release:
    types: [published]

env:
  VERSION_TYPE: beta

jobs:
  publish:
    name: Publish to Github, Modrinth and CurseForge
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@4d9f0ba0025fe599b4ebab900eb7f3a1d93ef4c2 # v5.0.0

      - name: Grant execute permission for gradlew
        shell: bash
        run: chmod +x gradlew

      - name: Set up JDK 8
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5.0.0
        with:
          java-version: |
            8
            21
          distribution: 'temurin'

      # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
      # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@4d9f0ba0025fe599b4ebab900eb7f3a1d93ef4c2 # v5.0.0

      - name: Get Mod Version
        id: get_mod_version
        run: |
          VERSION=$(./gradlew -q printVersion | grep -E "^[0-9]+(\.[0-9]+)*-[0-9]+(\.[0-9]+)*$")
          echo "Version is $VERSION"
          echo "mod_version=$VERSION" >> $GITHUB_ENV

      - name: Build with Gradle Wrapper
        run: ./gradlew build

      - name: Publish to Modrinth and CurseForge and Github
        uses: Kir-Antipov/mc-publish@995edadc13559a8b28d0b7e6571229f067ec7659 # v3.3.0
        with:
          version-type: ${{ env.VERSION_TYPE }}
          name: "Clayium Unofficial: ${{ env.mod_version }}"
          loaders: forge
          game-versions: 1.12.2
          java: 1.8

          dependencies: |
            codechicken-lib(required){modrinth:2gq0ALnz}{curseforge:242818}
            forgelin-continuous(required)
            mixinbooter(required){modrinth:G1ckZuWK}{curseforge:419286}
            modularui(required)
            jei(optional)
            groovyscript(optional)
            the-one-probe(optional)

          github-token: ${{ secrets.GITHUB_TOKEN }}

          modrinth-id: m5ogv9xL
          modrinth-featured: true
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          curseforge-id: 1096085
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

  dependency-submission:

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Set up JDK 17
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5.0.0
        with:
          java-version: '17'
          distribution: 'temurin'

      # Generates and submits a dependency graph, enabling Dependabot Alerts for all project dependencies.
      # See: https://github.com/gradle/actions/blob/main/dependency-submission/README.md
      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@4d9f0ba0025fe599b4ebab900eb7f3a1d93ef4c2 # v5.0.0
